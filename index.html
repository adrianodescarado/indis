<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual do Homem Indisciplinado — Foco e Disciplina de Verdade</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c8a84b;
    --gold-light: #e6c97a;
    --gold-dark: #a0842d;
    --black: #0a0a0a;
    --dark: #111111;
    --dark2: #1a1a1a;
    --dark3: #242424;
    --white: #ffffff;
    --gray: #888888;
    --gray-light: #cccccc;
    --red-accent: #c0392b;
    --green-accent: #27ae60;
    --max-w: 720px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Barlow', sans-serif;
    background: #f5f3ef;
    color: var(--black);
    font-size: 16px;
    line-height: 1.7;
  }

  /* ── HERO ── */
  .hero {
    background: var(--black);
    color: var(--white);
    padding: 80px 24px 70px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(200,168,75,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-inner { max-width: var(--max-w); margin: 0 auto; position: relative; }
  .hero-tag {
    display: inline-block;
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(200,168,75,0.4);
    padding: 6px 16px;
    border-radius: 2px;
    margin-bottom: 28px;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 900;
    line-height: 1.2;
    color: var(--white);
    margin-bottom: 20px;
  }
  .hero h1 em {
    font-style: normal;
    color: var(--gold);
    display: block;
  }
  .hero-sub {
    font-size: 17px;
    font-weight: 300;
    color: rgba(255,255,255,0.65);
    max-width: 560px;
    margin: 0 auto 36px;
    line-height: 1.8;
  }
  .btn-primary {
    display: inline-block;
    background: var(--gold);
    color: var(--black);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 16px 40px;
    border-radius: 3px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .hero-note { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 12px; }

  /* ── PATTERN BREAK ── */
  .pattern-break {
    background: var(--dark);
    padding: 60px 24px;
    text-align: center;
  }
  .pattern-break blockquote {
    max-width: 560px;
    margin: 0 auto;
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 400;
    font-style: italic;
    color: rgba(255,255,255,0.8);
    line-height: 1.6;
  }
  .pattern-break blockquote strong {
    color: var(--gold);
    font-style: normal;
    font-weight: 700;
  }

  /* ── SECTIONS ── */
  .section {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 64px 24px;
  }
  .section-alt {
    background: var(--white);
    padding: 64px 24px;
  }
  .section-alt .inner { max-width: var(--max-w); margin: 0 auto; }

  .section-dark {
    background: var(--dark);
    padding: 64px 24px;
    color: var(--white);
  }
  .section-dark .inner { max-width: var(--max-w); margin: 0 auto; }

  h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 3.5vw, 32px);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 28px;
    color: inherit;
  }
  h2 .gold { color: var(--gold); }
  h3 {
    font-family: 'Barlow', sans-serif;
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  p { font-size: 16px; line-height: 1.8; margin-bottom: 16px; }
  p:last-child { margin-bottom: 0; }

  /* ── PAIN LIST ── */
  .pain-list { list-style: none; margin: 0; padding: 0; }
  .pain-list li {
    padding: 13px 0 13px 32px;
    border-bottom: 1px solid #e8e4dc;
    position: relative;
    font-size: 16px;
    line-height: 1.6;
  }
  .pain-list li:last-child { border-bottom: none; }
  .pain-list li::before {
    content: '✕';
    position: absolute;
    left: 0;
    top: 14px;
    color: var(--red-accent);
    font-size: 13px;
    font-weight: 600;
  }

  /* ── STORY BLOCK ── */
  .story-block {
    border-left: 3px solid var(--gold);
    padding: 24px 28px;
    background: #faf8f3;
    margin: 28px 0;
  }
  .story-block p { font-size: 16px; font-style: italic; color: #333; }

  /* ── BOOK PRESENTATION ── */
  .book-presentation {
    background: var(--black);
    padding: 64px 24px;
  }
  .book-presentation .inner {
    max-width: var(--max-w);
    margin: 0 auto;
    display: flex;
    gap: 48px;
    align-items: center;
  }
  .book-cover-wrap { flex-shrink: 0; }
  .book-cover {
    width: 160px;
    height: 210px;
    background: var(--dark2);
    border: 1px solid rgba(200,168,75,0.6);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
    box-shadow: 8px 8px 32px rgba(0,0,0,0.6);
  }
  .book-cover::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, var(--gold-dark), var(--gold), var(--gold-dark));
    border-radius: 4px 0 0 4px;
  }
  .book-cover-icon { font-size: 40px; margin-bottom: 12px; }
  .book-cover-title {
    font-family: 'Playfair Display', serif;
    font-size: 9px;
    color: var(--gold);
    text-align: center;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    line-height: 1.6;
  }
  .book-info { flex: 1; }
  .book-info h2 { color: var(--white); margin-bottom: 12px; }
  .book-info p { color: rgba(255,255,255,0.6); font-size: 15px; }

  /* ── BENEFITS ── */
  .benefit-list { list-style: none; margin: 0; padding: 0; }
  .benefit-list li {
    padding: 13px 0 13px 32px;
    border-bottom: 1px solid #e8e4dc;
    position: relative;
    font-size: 16px;
    line-height: 1.6;
  }
  .benefit-list li:last-child { border-bottom: none; }
  .benefit-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    top: 13px;
    color: var(--gold-dark);
    font-weight: 600;
  }

  /* ── MODULES GRID ── */
  .modules-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 24px;
  }
  .module-card {
    background: #faf8f3;
    border: 1px solid #e2ddd3;
    border-radius: 4px;
    padding: 20px;
  }
